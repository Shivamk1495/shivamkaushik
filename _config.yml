    <script>
        try {
            function cleanCitations(node) {
                if (node.nodeType === 3) { 
                    node.nodeValue = node.nodeValue.replace(/\+\]/g, '');
                } else {
                    let children = Array.from(node.childNodes);
                    for (let child of children) { cleanCitations(child); }
                }
            }
            document.addEventListener('DOMContentLoaded', () => { cleanCitations(document.body); });
        } catch(e) {}
    </script>

    <script>
        try {
            function switchPage(pageId) {
                document.querySelectorAll('.page').forEach(page => { page.classList.remove('active'); });
                document.querySelectorAll('.nav-links .nav-btn, .nav-links .btn-highlight').forEach(btn => { btn.classList.remove('active'); });
                
                const targetPage = document.getElementById('page-' + pageId);
                if(targetPage) { targetPage.classList.add('active'); }
                
                const targetNav = document.getElementById('nav-' + pageId);
                if(targetNav) { targetNav.classList.add('active'); }

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch(e) {}
    </script>

    <script>
        try {
            const canvas = document.getElementById('neural-canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let neurons = [];
            let signals = [];
            const mouse = { x: null, y: null, radius: 180 };

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.x;
                mouse.y = e.y;
            });

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initNeurons();
            }

            class Neuron {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.radius = Math.random() * 2 + 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(10, 132, 255, 0.8)'; /* Apple Blue Soma */
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(10, 132, 255, 0.8)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            class Signal {
                constructor(startX, startY, endX, endY) {
                    this.x = startX;
                    this.y = startY;
                    this.targetX = endX;
                    this.targetY = endY;
                    this.progress = 0;
                    this.speed = Math.random() * 0.02 + 0.01;
                    this.active = true;
                }
                update() {
                    this.progress += this.speed;
                    if (this.progress >= 1) {
                        this.active = false; 
                    } else {
                        this.x = this.x + (this.targetX - this.x) * this.speed;
                        this.y = this.y + (this.targetY - this.y) * this.speed;
                    }
                }
                draw() {
                    if (!this.active) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#64D2FF'; /* Bright Apple Cyan Signal */
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#64D2FF';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function initNeurons() {
                neurons = [];
                signals = [];
                let numNeurons = (width * height) / 15000; 
                for (let i = 0; i < numNeurons; i++) {
                    neurons.push(new Neuron());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                for (let i = 0; i < neurons.length; i++) {
                    neurons[i].update();
                    neurons[i].draw();
                    
                    for (let j = i + 1; j < neurons.length; j++) {
                        let dx = neurons[i].x - neurons[j].x;
                        let dy = neurons[i].y - neurons[j].y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(191, 90, 242, ${0.4 - (distance/150)*0.4})`; /* Apple Purple Dendrites */
                            ctx.lineWidth = 1;
                            ctx.moveTo(neurons[i].x, neurons[i].y);
                            ctx.lineTo(neurons[j].x, neurons[j].y);
                            ctx.stroke();

                            if (Math.random() < 0.0015) {
                                signals.push(new Signal(neurons[i].x, neurons[i].y, neurons[j].x, neurons[j].y));
                            }
                        }
                    }
                }

                for (let i = signals.length - 1; i >= 0; i--) {
                    signals[i].update();
                    signals[i].draw();
                    if (!signals[i].active) signals.splice(i, 1);
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();
        } catch(e) {}
    </script>
